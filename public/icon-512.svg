<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="60%" stop-color="#0a1a4a"/>
      <stop offset="100%" stop-color="#000010"/>
    </radialGradient>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ffaa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0088ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Maskable safe-area: keep the penguin within the inner 80% (off 51px from each edge) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Aurora -->
  <path d="M0 110 Q 128 40 256 90 T 512 70 L 512 160 Q 384 200 256 150 T 0 180 Z" fill="url(#aurora)" opacity="0.55"/>
  <!-- Stars -->
  <g fill="#fff" opacity="0.7">
    <circle cx="80" cy="60" r="2"/>
    <circle cx="180" cy="40" r="1.5"/>
    <circle cx="320" cy="70" r="2"/>
    <circle cx="430" cy="50" r="1.5"/>
    <circle cx="470" cy="120" r="1.8"/>
  </g>
  <!-- Snowy ground -->
  <ellipse cx="256" cy="480" rx="280" ry="60" fill="#e8f4ff"/>
  <!-- Penguin -->
  <g transform="translate(256 290)">
    <!-- Body shadow -->
    <ellipse cx="0" cy="160" rx="120" ry="14" fill="rgba(0,0,0,0.3)"/>
    <!-- Body (black) -->
    <ellipse cx="0" cy="40" rx="115" ry="135" fill="#0a0a0a"/>
    <!-- White belly -->
    <ellipse cx="0" cy="60" rx="78" ry="100" fill="#ffffff"/>
    <!-- Head -->
    <ellipse cx="0" cy="-90" rx="95" ry="85" fill="#0a0a0a"/>
    <!-- Face white -->
    <ellipse cx="0" cy="-75" rx="60" ry="55" fill="#ffffff"/>
    <!-- Eyes -->
    <circle cx="-25" cy="-95" r="11" fill="#0a0a0a"/>
    <circle cx="25" cy="-95" r="11" fill="#0a0a0a"/>
    <circle cx="-22" cy="-99" r="3" fill="#fff"/>
    <circle cx="28" cy="-99" r="3" fill="#fff"/>
    <!-- Beak -->
    <path d="M -18 -65 L 18 -65 L 0 -38 Z" fill="#ffae00"/>
    <path d="M -14 -56 L 14 -56 L 0 -42 Z" fill="#cc8800"/>
    <!-- Wings -->
    <ellipse cx="-100" cy="40" rx="22" ry="60" fill="#0a0a0a" transform="rotate(-15 -100 40)"/>
    <ellipse cx="100" cy="40" rx="22" ry="60" fill="#0a0a0a" transform="rotate(15 100 40)"/>
    <!-- Feet -->
    <ellipse cx="-35" cy="170" rx="32" ry="14" fill="#ffae00"/>
    <ellipse cx="35" cy="170" rx="32" ry="14" fill="#ffae00"/>
  </g>
</svg>
